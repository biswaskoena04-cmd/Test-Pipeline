name: Test Pipeline

on: [push]

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 1. Download and set up the CodeQL CLI binaries at runtime
      - name: Install CodeQL CLI
        run: |
          wget https://github.com/github/codeql-cli-binaries/releases/latest/download/codeql-linux64.zip
          unzip -q codeql-linux64.zip
          echo "$GITHUB_WORKSPACE/codeql" >> $GITHUB_PATH

      - name: Install dependencies
        run: pip install semgrep tree_sitter tree_sitter_c

      # 2. Run your slicer (which can now invoke `codeql` shell commands)
      - name: Run slicer
        run: python slicer.py
